name: Release

on:
  push:
    branches-ignore:
      - '**'
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    environment: release
    env:
      TAG_NAME: ${{ github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          cache: npm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Run lint (if configured)
        run: npm run lint --if-present

      - name: Run tests (if configured)
        run: npm run test --if-present

      - name: Determine release channel
        id: channel
        shell: bash
        run: |
          set -euo pipefail
          tag="${TAG_NAME}"

          if [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "channel=stable" >> "$GITHUB_OUTPUT"
            echo "npm_tag=latest" >> "$GITHUB_OUTPUT"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$ ]]; then
            echo "channel=beta" >> "$GITHUB_OUTPUT"
            echo "npm_tag=beta" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          elif [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+-rc\.[0-9]+$ ]]; then
            echo "channel=rc" >> "$GITHUB_OUTPUT"
            echo "npm_tag=rc" >> "$GITHUB_OUTPUT"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${tag#v}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported tag format: $tag"
            exit 1
          fi

      - name: Verify package version matches tag
        shell: bash
        run: |
          set -euo pipefail
          pkg_version=$(node -p "require('./package.json').version")
          tag_version='${{ steps.channel.outputs.version }}'
          if [[ "$pkg_version" != "$tag_version" ]]; then
            echo "package.json version ($pkg_version) does not match tag version ($tag_version)"
            exit 1
          fi

      - name: Create release tarball
        id: pack
        run: |
          mkdir -p release-artifacts
          RELEASE_VERSION='${{ env.TAG_NAME }}' node scripts/create-release-tarball.mjs > release-artifacts/pack.json
          echo "tarball_path=$(jq -r '.tarballPath' release-artifacts/pack.json)" >> "$GITHUB_OUTPUT"
          echo "tarball_name=$(jq -r '.tarballName' release-artifacts/pack.json)" >> "$GITHUB_OUTPUT"

      - name: Compute checksum
        id: checksum
        run: |
          sha=$(sha256sum "${{ steps.pack.outputs.tarball_path }}" | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Upload release artifact (workflow)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.pack.outputs.tarball_name }}
          path: ${{ steps.pack.outputs.tarball_path }}

      - name: Publish to npm (stable)
        if: steps.channel.outputs.channel == 'stable'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is required"
            exit 1
          fi
          npm publish

      - name: Publish to npm (prerelease)
        if: steps.channel.outputs.channel != 'stable'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN secret is required"
            exit 1
          fi
          npm publish --tag "${{ steps.channel.outputs.npm_tag }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          name: ${{ env.TAG_NAME }}
          prerelease: ${{ steps.channel.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: |
            ${{ steps.pack.outputs.tarball_path }}

      - name: Determine Homebrew tap update availability
        id: tap
        if: steps.channel.outputs.channel == 'stable'
        env:
          TAP_REPO: ${{ vars.HOMEBREW_TAP_REPO }}
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          if [ -n "${TAP_REPO}" ] && [ -n "${TAP_TOKEN}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout Homebrew tap repo
        if: steps.channel.outputs.channel == 'stable' && steps.tap.outputs.enabled == 'true'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ vars.HOMEBREW_TAP_REPO }}
          token: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update Homebrew formula (stable only)
        if: steps.channel.outputs.channel == 'stable' && steps.tap.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p homebrew-tap/Formula
          release_url="https://github.com/${{ github.repository }}/releases/download/${TAG_NAME}/${{ steps.pack.outputs.tarball_name }}"
          node scripts/generate-homebrew-formula.mjs \
            --version "${{ steps.channel.outputs.version }}" \
            --url "$release_url" \
            --sha256 "${{ steps.checksum.outputs.sha256 }}" > homebrew-tap/Formula/sidecar.rb

      - name: Commit and push Homebrew formula
        if: steps.channel.outputs.channel == 'stable' && steps.tap.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/sidecar.rb
          if git diff --cached --quiet; then
            echo "No Homebrew formula changes to commit"
            exit 0
          fi
          git commit -m "sidecar ${TAG_NAME}"
          git push

      - name: Homebrew tap not configured
        if: steps.channel.outputs.channel == 'stable' && steps.tap.outputs.enabled != 'true'
        run: echo "Skipping Homebrew tap update (HOMEBREW_TAP_REPO or HOMEBREW_TAP_GITHUB_TOKEN not configured)."
